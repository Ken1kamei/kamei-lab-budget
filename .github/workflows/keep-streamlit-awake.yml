name: Keep Streamlit Awake

on:
  schedule:
    # Ping every 6 hours. Offset from minute 0 because GitHub schedule jobs can
    # be delayed at busy boundaries.
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      app_urls:
        description: "Optional newline-separated Streamlit app URLs to ping for this manual run"
        required: false
        type: string

permissions:
  contents: read

jobs:
  ping:
    name: Ping Streamlit apps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      DEFAULT_APP_URLS: |
        https://kamei-lab-budget-qff7jmewjwgpft4qyhc7hb.streamlit.app/
        https://kamei-lab-tools.streamlit.app/
        https://kamei-lab-roadmap.streamlit.app/
        https://kamei-lab-notebooks-protocols.streamlit.app/
      CONFIGURED_APP_URLS: ${{ vars.STREAMLIT_APP_URLS }}
      MANUAL_APP_URLS: ${{ inputs.app_urls }}

    steps:
      - name: Resolve app URLs
        id: targets
        shell: bash
        run: |
          if [[ -n "${MANUAL_APP_URLS}" ]]; then
            printf "%s\n" "${MANUAL_APP_URLS}" > /tmp/streamlit-urls.txt
          elif [[ -n "${CONFIGURED_APP_URLS}" ]]; then
            printf "%s\n" "${CONFIGURED_APP_URLS}" > /tmp/streamlit-urls.txt
          else
            printf "%s\n" "${DEFAULT_APP_URLS}" > /tmp/streamlit-urls.txt
          fi

          sed -i.bak '/^[[:space:]]*$/d' /tmp/streamlit-urls.txt
          count="$(wc -l < /tmp/streamlit-urls.txt | tr -d ' ')"

          if [[ "$count" -eq 0 ]]; then
            echo "No Streamlit URLs configured." >&2
            exit 1
          fi

          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Resolved $count Streamlit app URL(s):"
          cat /tmp/streamlit-urls.txt

      - name: Wake Streamlit apps
        shell: bash
        run: |
          while IFS= read -r url; do
            echo "Pinging ${url}"
            status_code="$(curl \
              --silent \
              --show-error \
              --dump-header /tmp/streamlit-keep-awake.headers \
              --output /tmp/streamlit-keep-awake.body \
              --write-out "%{http_code}" \
              --retry 4 \
              --retry-all-errors \
              --retry-delay 20 \
              --max-time 120 \
              --user-agent "kamei-lab-streamlit-keep-awake/1.0" \
              "${url}")"

            if grep -qi '^location: .*share\.streamlit\.io/-/auth/app' /tmp/streamlit-keep-awake.headers; then
              location="$(awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}' /tmp/streamlit-keep-awake.headers | tail -1)"
              echo "::warning title=Streamlit Cloud auth blocks keep-awake::${url} redirects to Cloud auth instead of the app. Disable Streamlit Cloud app-level authentication/password protection, or this unauthenticated keep-awake job cannot wake the app."
              echo "Location: ${location}"
              continue
            fi

            if [[ "$status_code" -lt 200 || "$status_code" -ge 400 ]]; then
              echo "Streamlit ping failed with HTTP $status_code for ${url}" >&2
              exit 1
            fi

            echo "Streamlit ping returned HTTP $status_code for ${url}"
          done < /tmp/streamlit-urls.txt
